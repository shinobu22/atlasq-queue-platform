input {
  beats {
    port => 5044
  }
}

filter {
  if [docker][container][labels][co.elastic.logs/enabled] == "true" {
    
    if [message] {
      if [message] =~ /^\{.*\}$/ {
        json {
          source => "message"
          target => "parsed"
        }
        
        if [parsed] {
          mutate {
            copy => { "[parsed]" => "" }
            remove_field => ["parsed", "message"]
          }
        }
      }
    }

    if ![service] {
      if [docker][container][name] =~ /producer/ {
        mutate { add_field => { "service" => "atlasq-producer" } }
      } else if [docker][container][name] =~ /worker/ {
        mutate { add_field => { "service" => "atlasq-worker" } }
      } else {
        mutate { add_field => { "service" => "atlasq-unknown" } }
      }
    }

    if ![env] {
      mutate { add_field => { "env" => "docker" } }
    }

    if ![version] {
      mutate { add_field => { "version" => "0.1.0" } }
    }

    if [ts] {
      date {
        match => [ "ts", "ISO8601" ]
        target => "@timestamp"
      }
    }

    if [level] {
      mutate {
        lowercase => [ "level" ]
      }
    }

    mutate {
      remove_field => [ "stream", "beat", "prospector", "offset", "source" ]
    }

  } else {
    drop { }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_URL:elasticsearch:9200}"]
    index => "atlasq-logs-%{+YYYY.MM.dd}"
    template_name => "atlasq-logs"
    template => {
      "index_patterns" => ["atlasq-logs-*"]
      "settings" => {
        "number_of_shards" => 1
        "number_of_replicas" => 0
        "index.lifecycle.name" => "atlasq-policy"
        "index.lifecycle.rollover_alias" => "atlasq-logs"
      }
      "mappings" => {
        "properties" => {
          "@timestamp" => { "type" => "date" }
          "level" => { "type" => "keyword" }
          "service" => { "type" => "keyword" }
          "env" => { "type" => "keyword" }
          "version" => { "type" => "keyword" }
          "request_id" => { "type" => "keyword" }
          "task_id" => { "type" => "keyword" }
          "task_type" => { "type" => "keyword" }
          "queue" => { "type" => "keyword" }
          "attempt" => { "type" => "integer" }
          "latency_ms" => { "type" => "long" }
          "status_code" => { "type" => "integer" }
          "method" => { "type" => "keyword" }
          "path" => { "type" => "keyword" }
          "msg" => { "type" => "text" }
          "error" => { "type" => "text" }
        }
      }
    }
  }

  stdout {
    codec => rubydebug
  }
}