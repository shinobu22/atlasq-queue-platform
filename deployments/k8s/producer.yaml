# WARNING: This is for development only - not production ready
# Missing: proper security, resource limits, HPA, ingress TLS, etc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: atlasq
  labels:
    app: producer
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
        component: api
    spec:
      containers:
      - name: producer
        image: atlasq/producer:latest
        ports:
        - containerPort: 8080
        env:
        - name: APP_ENV
          value: "kubernetes"
        - name: REDIS_ADDR
          value: "redis:6379"
        - name: REDIS_PASSWORD
          value: "atlasqredis" # Use Secret in production
        - name: HTTP_ADDR
          value: ":8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: producer
  namespace: atlasq
spec:
  selector:
    app: producer
  ports:
  - port: 8080
    targetPort: 8080
  type: LoadBalancer # Use Ingress in production
