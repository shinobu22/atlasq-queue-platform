# WARNING: This is for development only - not production ready
# Missing: proper authentication, SSL/TLS, network policies
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asynqmon
  namespace: atlasq
  labels:
    app: asynqmon
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asynqmon
  template:
    metadata:
      labels:
        app: asynqmon
        component: monitoring
    spec:
      containers:
      - name: asynqmon
        image: ghcr.io/hibiken/asynqmon:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASYNQMON_REDIS_ADDR
          value: "redis:6379"
        - name: ASYNQMON_REDIS_PASSWORD
          value: "atlasqredis" # Use Secret in production
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: asynqmon
  namespace: atlasq
spec:
  selector:
    app: asynqmon
  ports:
  - port: 8081
    targetPort: 8080
  type: LoadBalancer # Use Ingress with auth in production