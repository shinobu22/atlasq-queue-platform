# WARNING: This is for development only - not production ready
# Missing: proper security, resource limits, HPA, monitoring setup, etc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: atlasq
  labels:
    app: worker
    component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        component: worker
    spec:
      containers:
      - name: worker
        image: atlasq/worker:latest
        ports:
        - containerPort: 9090
        env:
        - name: APP_ENV
          value: "kubernetes"
        - name: REDIS_ADDR
          value: "redis:6379"
        - name: REDIS_PASSWORD
          value: "atlasqredis" # Use Secret in production
        - name: WORKER_METRICS_ADDR
          value: ":9090"
        - name: ASYNQ_CONCURRENCY_CRITICAL
          value: "10"
        - name: ASYNQ_CONCURRENCY_DEFAULT
          value: "5"
        - name: ASYNQ_CONCURRENCY_LOW
          value: "3"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: atlasq
spec:
  selector:
    app: worker
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP